name: V4 browser diagnostics
on:
  push:
  pull_request:
permissions:
  contents: read
jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Run focused browser tests
        shell: bash
        run: |
          BRANCH="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
          git clone --quiet --depth 1 --branch "$BRANCH" "https://github.com/$GITHUB_REPOSITORY.git" site
          cd site
          npm install --silent
          npx playwright install --with-deps chromium >/dev/null 2>&1
          python3 -m http.server 4173 >/tmp/teacher-quest-server.log 2>&1 &
          npm run test:smoke
