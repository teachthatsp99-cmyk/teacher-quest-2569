name: Verify website
on:
  push:
  pull_request:
permissions:
  contents: read
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install test dependencies
        run: npm ci --silent
      - name: Check JavaScript syntax
        run: |
          node --check data.js
          node --check online-config.js
          node --check online.js
          node --check adventure.js
          node --check app.js
          node --check v4.js
          node --check scripts/validate.mjs
          node --check tests/smoke.spec.cjs
      - name: Validate question bank and assets
        run: npm run validate
      - name: Check active V4 files are loaded
        run: |
          grep -q 'v4.css' index.html
          grep -q 'v4.js' index.html
          grep -q 'online.js' index.html
          grep -q 'online.css' index.html
          grep -q 'raid.css' index.html
          test -e database.rules.json
          test -e FIREBASE_ONLINE_SETUP.md
          test ! -e cloud-sync.js
          test ! -e firebase-config.js
          test ! -e v4-cleanup.js
          test ! -e FIREBASE_SETUP.md
          test ! -e firestore.rules
      - name: Check unwanted production copy
        run: |
          ! grep -RniE 'บันทึกความคืบหน้าอัตโนมัติในเครื่อง|เล่นได้โดยไม่ใช้อินเทอร์เน็ต|จุดที่ตรวจและแก้ไข|สิ่งที่ต่างจากไฟล์ต้นฉบับ|เว็บไซต์ PixelArt สอบครูผู้ช่วย' index.html app.js styles.css v4.js v4.css
      - name: Install Chromium
        run: npx playwright install --with-deps chromium >/dev/null 2>&1
      - name: Run browser and mobile smoke tests
        run: npm run test:smoke
