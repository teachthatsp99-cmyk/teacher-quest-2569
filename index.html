classroom","source":"บรรยากาศและวินัยเชิงบวก","reason":"บรรยากาศทางจิตวิทยาคือความรู้สึกปลอดภัย อบอุ่น เป็นกันเอง เคารพกัน และยอมรับความแตกต่าง ซึ่งทำให้กล้าถามและกล้าลอง","distractor":"ป้ายนิเทศ แสง อากาศ และโต๊ะเป็นสภาพแวดล้อมทางกายภาพ","mnemonic":"ใจปลอดภัย จึงเรียนได้เต็มที่","caution":false},{"id":42,"question":"การจัดการความขัดแย้งระหว่างนักเรียนในห้องเรียนด้วยแนวทาง วินัยเชิงบวก ครูควรดําเนินการในข้อใด","options":["ทำโทษนักเรียนทั้งคู่เพื่อความยุติธรรม","ให้ทั้งสองฝูายบอกเล่าเหตุการณ์และร่วมกันหาวิธีแก้ไขความขัดแย้ง","นำเรื่องไปแจ้งผู้ปกครองทันทีเพื่อให้จัดการพฤติกรรม","ตัดคะแนนความประพฤติโดยไม่ต้องสอบถามเหตุผล"],"answer":1,"category":"การจัดการชั้นเรียน","icon":"classroom","source":"บรรยากาศและวินัยเชิงบวก","reason":"วินัยเชิงบวกเน้นฟังทุกฝ่าย ช่วยให้เห็นผลกระทบ รับผิดชอบ และร่วมกันหาทางแก้ เพื่อฟื้นความสัมพันธ์และป้องกันซ้ำ","distractor":"การลงโทษทันทีโดยไม่ฟังเหตุผลอาจหยุดพฤติกรรมชั่วคราวแต่ไม่สร้างทักษะแก้ขัดแย้ง","mnemonic":"ฟัง-เข้าใจ-รับผิดชอบ-ซ่อมแซม","caution":false},{"id":43,"question":"การตั้งข้อตกลงร่วมกันในชั้นเรียน ควรดําเนินการในลักษณะใดจึงจะเกิดประสิทธิภาพ","options":["ครูเป็นผู้กําหนดกฎระเบียบทั้งหมดและติดประกาศไว้หน้าห้อง","ครูนํากฎระเบียบของโรงเรียนมาบังคับใช้โดยเคร่งครัด","ครูและนักเรียนร่วมกันระดมสมองกําหนดข้อตกลงและบทลงโทษที่เหมาะสม","ให้นักเรียนหัวหน้าห้องเป็นคนกําหนดกฎเกณฑ์เพียงผู้เดียว"],"answer":2,"category":"การจัดการชั้นเรียน","icon":"classroom","source":"บรรยากาศและวินัยเชิงบวก","reason":"ข้อตกลงที่ครูและนักเรียนร่วมกันสร้างทำให้ทุกคนเข้าใจเหตุผล รู้สึกเป็นเจ้าของ และยอมรับผลตามข้อตกลงมากกว่า","distractor":"การกำหนดฝ่ายเดียวทำให้ผู้เรียนทำตามเพราะกลัวมากกว่าตระหนัก","mnemonic":"กติกาที่ร่วมคิด มีพลังมากกว่ากฎที่สั่ง","caution":false},{"id":44,"question":"สภาพแวดล้อมทางกายภาพของห้องเรียนที่มีผลต่อการเรียนรู้ของผู้เรียน หมายถึงข้อใด","options":["ความสัมพันธ์ระหว่างครูกับนักเรียน","แสงสว่าง เสียง อุณหภูมิ และการจัดที่นั่ง","วิธีการสอนและสื่อการเรียนรู้","กฎระเบียบและบรรยากาศการแข่งขัน"],"answer":1,"category":"การจัดการชั้นเรียน","icon":"classroom","source":"บรรยากาศและวินัยเชิงบวก","reason":"สภาพแวดล้อมทางกายภาพคือสิ่งที่สัมผัสและจัดได้ เช่น แสง เสียง อุณหภูมิ พื้นที่ และการจัดที่นั่ง ซึ่งกระทบสมาธิและความสะดวก","distractor":"ความสัมพันธ์ กฎ และวิธีสอนเป็นมิติทางจิตวิทยาหรือการจัดการเรียนรู้","mnemonic":"กายภาพ = ห้องที่มองเห็นและสัมผัสได้","caution":false},{"id":45,"question":"หากพบว่านักเรียนมีพฤติกรรมคุยกันเสียงดังระหว่างครูสอน เทคนิคการจัดการชั้นเรียนเบื้องต้นที่นุ่มนวลคือข้อใด","options":["การใช้ความเงียบหยุดสอนชั่วคราวและการใช้สายตามองไปที่นักเรียน","การตะโกนสั่งให้เงียบผ่านไมโครโฟน","การไล่นักเรียนออกไปยืนหน้าห้องเรียน","การขว้างแปรงลบกระดานลงบนโต๊ะเพื่อเรียกสติ"],"answer":0,"category":"การจัดการชั้นเรียน","icon":"classroom","source":"บรรยากาศและวินัยเชิงบวก","reason":"การหยุดพูดชั่วคราวและใช้สายตาเป็นสัญญาณที่นุ่มนวล ไม่ทำให้นักเรียนเสียหน้า และมักดึงความสนใจกลับได้โดยไม่ขัดจังหวะมาก","distractor":"การตะโกน ไล่ออก หรือขว้างของรุนแรงและอาจทำลายบรรยากาศปลอดภัย","mnemonic":"เริ่มเบาก่อน: เงียบ-ใกล้-สบตา","caution":false},{"id":46,"question":"เป้าหมายหลักของการทําวิจัยในชั้นเรียน (Classroom Action Research) คือข้อใด","options":["เพื่อนําเสนอในงานประชุมวิชาการระดับชาติ","เพื่อแก้ปัญหาและพัฒนาการเรียนรู้ของผู้เรียนในบริบทชั้นเรียน","เพื่อใช้เป็นผลงานหลักในการประเมินวิทยฐานะ","เพื่อสร้างทฤษฎีการศึกษาใหม่ๆ"],"answer":1,"category":"วิจัยในชั้นเรียน","icon":"flask","source":"Classroom Action Research","reason":"วิจัยในชั้นเรียนมีเป้าหมายตรงที่การแก้ปัญหาและพัฒนาการเรียนรู้ในห้องของครู โดยใช้ข้อมูลวางแผน ทดลอง และปรับการสอน","distractor":"การประชุม วิทยฐานะ หรือสร้างทฤษฎีอาจเป็นผลต่อยอด แต่ไม่ใช่เป้าหมายหลัก","mnemonic":"วิจัยเพื่อเด็กในห้องนี้","caution":false},{"id":47,"question":"ขั้นตอนแรกของกระบวนการวิจัยในชั้นเรียน คือข้อใด","options":["การสร้างเครื่องมือวิจัย","การเก็บรวบรวมข้อมูล","การสำรวจและวิเคราะห์สภาพปัญหาการเรียนรู้","การเขียนรายงานการวิจัย"],"answer":2,"category":"วิจัยในชั้นเรียน","icon":"flask","source":"Classroom Action Research","reason":"ต้องเริ่มจากสำรวจและวิเคราะห์ปัญหาให้ชัด function checkAnswer(){const s=state.session,q=qNow();if(s.selected===null)return;const ok=s.selected===q.answer;s.revealed=true;state.answers[q.id]={selected:s.selected,correct:ok,day:dayKey(),time:Date.now()};if(ok){s.correct++;s.combo++;s.enemyHp=0;state.xp+=10+Math.min(10,s.combo);state.coins+=2;state.wrong.delete(q.id);state.comboBest=Math.max(state.comboBest,s.combo);beep(880,.12);setTimeout(()=>{document.getElementById('playerSprite')?.classList.add('attack');document.getElementById('enemySprite')?.classList.add('hit');damageText('−100',70)},20);confetti()}else{s.combo=0;s.hearts=Math.max(0,s.hearts-1);state.wrong.add(q.id);state.xp+=2;beep(140,.18,'sawtooth');damageText('−1 ♥',22)}scheduleDefault(q.id,ok);persist();renderQuiz(document.getElementById('content'))}
function damageText(t,right){setTimeout(()=>{const a=document.querySelector('.arena');if(!a)return;const e=document.createElement('div');e.className='damage';e.textContent=t;e.style.right=right+'px';e.style.top='80px';a.appendChild(e);setTimeout(()=>e.remove(),1000)},30)}
function feedbackHtml(q){const s=state.session,ok=s.selected===q.answer;return `<div class="feedback"><div class="feedback-head ${ok?'ok':'no'}">${ok?'✓ ถูกต้อง! โจมตีสำเร็จ':'✗ ยังไม่ถูก แต่เราเรียนรู้จากข้อนี้ได้'}</div><div class="feedback-grid"><div class="explain-card"><h4>ทำไมตอบข้อ ${q.answer+1}</h4><div>${q.reason}</div></div><div class="explain-card"><h4>ทำไมตัวเลือกอื่นไม่ใช่</h4><div>${q.distractor}</div></div><div class="memory-card"><b>💡 สูตรจำ:</b> ${q.mnemonic}<div class="source">อ้างอิงหัวข้อ: ${q.source}</div>${q.caution?'<div class="warning">ข้อมูลกลุ่มกฎหมาย/หลักเกณฑ์อาจมีประกาศแก้ไข ควรตรวจเอกสารราชการฉบับล่าสุดก่อนสอบจริง</div>':''}</div><div class="confidence"><span>ข้อนี้คุณมั่นใจแค่ไหน? ระบบจะกำหนดวันทบทวนให้</span><button class="btn small pink" data-rate="again">ยังไม่จำ</button><button class="btn small dark" data-rate="hard">ยาก</button><button class="btn small mint" data-rate="good">พอได้</button><button class="btn small sky" data-rate="easy">แม่นมาก</button></div></div></div>`}
function scheduleDefault(id,ok){const now=Date.now();state.review[id]={interval:ok?1:0,due:now+(ok?86400000:600000),ease:ok?2.3:1.8}}
function rateQuestion(id,r){const days={again:0.007,hard:1,good:3,easy:7}[r];state.review[id]={interval:days,due:Date.now()+days*86400000,ease:{again:1.7,hard:2,good:2.3,easy:2.6}[r]};persist();toast({again:'จะถามซ้ำเร็ว ๆ นี้',hard:'นัดทบทวนพรุ่งนี้',good:'นัดทบทวนใน 3 วัน',easy:'นัดทบทวนใน 7 วัน'}[r])}
function nextQuestion(){const s=state.session;if(s.hearts<=0&&s.pos<s.queue.length-1){toast('หัวใจหมด! เติมพลังแล้วลุยต่อ');s.hearts=3}s.pos++;s.selected=null;s.revealed=false;s.enemyHp=100;render()}
function finishPractice(){const s=state.session,total=s.queue.length,score=s.correct;state.history.push({type:'practice',date:Date.now(),score,total});state.history=state.history.slice(-20);state.xp+=Math.round(score/total*30);state.coins+=Math.round(score/3);persist();state.result={score,total,type:'practice'};state.route='result';state.session=null;render()}
function renderExamLanding(c){const last=state.history.filter(x=>x.type==='exam').at(-1);c.innerHTML=`<div class="panel pixel-box"><div class="panel-title"><div><h2>สนามจำลองสอบ 90 นาที</h2><small>75 ข้อ · ไม่เฉลยระหว่างทำ · ส่งคำตอบเมื่อพร้อม</small></div></div><div class="hero pixel-box" style="min-height:270px;margin:0"><div class="hero-grid"><div><div class="eyebrow">BOSS RUSH MODE</div><h1 style="font-size:clamp(36px,5vw,62px)">สอบจริง<br><span>ต้องนิ่งกว่าเดิม</span></h1><p>ระบบจะสุ่มลำดับคำถาม จับเวลา 1 ชั่วโมง 30 นาที และแสดงกระดาษคำตอบให้ข้ามข้อได้</p><div class="hero-actions"><button class="btn primary" id="startFullExam">เริ่มจับเวลา 90 นาที</button>${state.examDraft?'<button class="btn mint" id="resumeExam">ทำฉบับร่างต่อ</button>':''}</div>${last?`<p style="font-size:13px">คะแนนครั้งล่าสุด: <b style="color:var(--gold)">${last.score}/${last.total}</b></p>`:''}</div>${heroArt()}</div></div></div>`;document.getElementById('startFullExam').onclick=()=>startExam();if(state.examDraft)document.getElementById('resumeExam').onclick=()=>resumeExam()}
function startExam(){if(!confirm('เริ่มจำลองสอบ 75 ข้อ เวลา 90 นาทีหรือไม่?'))return;touchStreak();state.examDraft={order:shuffle(QUESTIONS.map(q=>q.id)),answers:{},pos:0,time:5400,startedAt:Date.now()};state.route='examRun';startExamTimer();render()}
function resumeExam(){state.route='examRun';startExamTimer();render()}
function startExamTimer(){clearInterval(state.examTimerId);state.examTimerId=setInterval(()=>{if(!state.examDraft)return;state.examDraft.time--;if(state.examDraft.time<=0){clearInterval(state.examTimerId);finishExam()}else{const e=document.getElementById('examTimer');if(e)e.textContent=formatTime(state.examDraft.time);if(state.examDraft.time%10===0)persist()}},1000)}
function formatTime(s){return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`}
function renderExamRun(c){const e=state.examDraft;if(!e){state.route='exam';return render()}const q=QUESTIONS.find(x=>x.id===e.order[e.pos]),sel=e.answers[q.id];c.innerHTML=`<div class="panel pixel-box"><div class="exam-head"><div><h2 style="margin:0">จำลองสอบครูผู้ช่วย</h2><small style="color:var(--muted)">ตอบแล้ว ${Object.keys(e.answers).length}/75 ข้อ</small></div><div class="timer-big" id="examTimer">${formatTime(e.time)}</div></div><div class="exam-grid"><div class="exam-question pixel-box"><div class="q-top"><span class="pill gold">ข้อที่ ${e.pos+1}</span><span class="pill">${q.category}</span><span class="pill">รหัสโจทย์ ${q.id}</span></div><h3>${q.question}</h3><div class="exam-options">${q.options.map((o,i)=>`<button class="exam-opt ${sel===i?'selected':''}" data-eopt="${i}">${i+1}. ${o}</button>`).join('')}</div><div class="quiz-foot"><button class="btn dark" id="prevExam" ${e.pos===0?'disabled':''}>← ก่อนหน้า</button><div><button class="btn pink small" id="clearExam">ล้างคำตอบข้อนี้</button> <button class="btn primary" id="nextExam">${e.pos===74?'ตรวจสอบก่อนส่ง':'ข้อต่อไป →'}</button></div></div></div><aside class="exam-side panel pixel-box"><h3 style="margin-top:0">กระดาษคำตอบ</h3><div class="number-grid">${e.order.map((id,i)=>`<button class="num-btn ${e.answers[id]!==undefined?'done':''} ${i===e.pos?'current':''}" data-pos="${i}">${i+1}</button>`).join('')}</div><div class="exam-note">สีเขียว = ตอบแล้ว · กรอบเหลือง = ข้อปัจจุบัน</div><button class="btn mint" id="submitExam" style="width:100%;margin-top:14px">ส่งคำตอบ</button></aside></div></div>`;document.querySelectorAll('[data-eopt]').forEach(b=>b.onclick=()=>{e.answers[q.id]=+b.dataset.eopt;persist();renderExamRun(c)});document.querySelectorAll('[data-pos]').forEach(b=>b.onclick=()=>{e.pos=+b.dataset.pos;persist();renderExamRun(c)});document.getElementById('prevExam').onclick=()=>{e.pos--;renderExamRun(c)};document.getElementById('nextExam').onclick=()=>{if(e.pos<74)e.pos++;else toast('ตรวจคำตอบในกระดาษคำตอบ แล้วกดส่งคำตอบ');renderExamRun(c)};document.getElementById('clearExam').onclick=()=>{delete e.answers[q.id];persist();renderExamRun(c)};document.getElementById('submitExam').onclick=()=>{const n=Object.keys(e.answers).length;if(n<75&&!confirm(`ยังไม่ได้ตอบ ${75-n} ข้อ ต้องการส่งหรือไม่?`))return;finishExam()}}
function finishExam(){clearInterval(state.examTimerId);state.examTimerId=null;const e=state.examDraft;if(!e)return;let score=0;e.order.forEach(id=>{const q=QUESTIONS.find(x=>x.id===id),sel=e.answers[id];if(sel===q.answer)score++;else if(sel!==undefined)state.wrong.add(id);state.answers[id]={selected:sel,correct:sel===q.answer,day:dayKey(),time:Date.now()}});state.history.push({type:'exam',date:Date.now(),score,total:75});state.history=state.history.slice(-20);state.xp+=score*2;state.coins+=Math.floor(score/2);state.result={score,total:75,type:'exam',answers:e.answers,order:e.order};state.examDraft=null;state.route='result';persist();confetti();render()}
function renderResult(c){const r=state.result||{score:0,total:1,type:'practice'},pct=Math.round(r.score/r.total*100),rank=pct>=90?'ระดับตำนาน — พร้อมชนสนามจริง':pct>=75?'ระดับนักรบ — ใกล้ถึงเป้าหมาย':pct>=60?'ระดับนักฝึก — มีพื้นฐานดี': 'ระดับเริ่มภารกิจ — รู้จุดอ่อนแล้ว';c.innerHTML=`<div class="result-card pixel-box"><div class="eyebrow">MISSION COMPLETE</div><div class="score-big">${r.score}/${r.total}</div><div class="rank">${rank}</div><p>คิดเป็น ${pct}% · ได้รับ XP และเหรียญสะสมแล้ว</p><div class="result-break"><div><b>${r.score}</b><span>ตอบถูก</span></div><div><b>${r.total-r.score}</b><span>ยังต้องทบทวน</span></div><div><b>${state.comboBest}</b><span>คอมโบสูงสุด</span></div></div><div class="hero-actions" style="justify-content:center"><button class="btn primary" id="againBtn">ฝึกต่อทันที</button><button class="btn mint" id="mistakesBtn">ทบทวนข้อผิด</button><button class="btn dark" id="homeBtn">กลับแผนที่</button></div></div>`;document.getElementById('againBtn').onclick=()=>startSession('smart');document.getElementById('mistakesBtn').onclick=()=>startSession('mistakes');document.getElementById('homeBtn').onclick=()=>go('home')}
function dueQuestions(){return QUESTIONS.filter(q=>state.review[q.id]&&(state.review[q.id].due||0)<=Date.now())}
function renderFlash(c){let due=dueQuestions();if(!due.length)due=QUESTIONS.filter(q=>state.wrong.has(q.id));if(!due.length)due=shuffle(QUESTIONS).slice(0,10);const q=due[0];c.innerHTML=`<div class="panel pixel-box"><div class="panel-title"><div><h2>แฟลชการ์ดจำระยะยาว</h2><small>คลิกการ์ดเพื่อพลิก แล้วประเมินความจำของตัวเอง</small></div><span class="pill gold">คิว ${due.length} ใบ</span></div><div class="flash-wrap"><div><div class="flashcard" id="flashcard"><div class="flash-inner"><div class="flash-face pixel-box"><div>${px(q.icon,72)}</div><div class="pill gold">คำถามข้อ ${q.id}</div><h3>${q.question}</h3><p>แตะเพื่อดูคำตอบ</p></div><div class="flash-face flash-back pixel-box"><div class="pill gold">คำตอบข้อ ${q.answer+1}</div><h3>${q.options[q.answer]}</h3><p>${q.reason}</p><div class="warning" style="color:#ffe6a5">สูตรจำ: ${q.mnemonic}</div></div></div></div><div class="hero-actions" style="justify-content:center"><button class="btn pink small" data-frate="again">ยังไม่จำ</button><button class="btn dark small" data-frate="hard">ยาก</button><button class="btn mint small" data-frate="good">พอได้</button><button class="btn sky small" data-frate="easy">แม่นมาก</button></div></div><aside class="flash-side pixel-box"><h3 style="margin-top:0">คิวทบทวน</h3><div class="due-list">${due.slice(0,16).map((x,i)=>`<div class="due-row"><b>#${x.id}</b> ${x.category}</div>`).join('')}</div></aside></div></div>`;document.getElementById('flashcard').onclick=e=>e.currentTarget.classList.toggle('flipped');document.querySelectorAll('[data-frate]').forEach(b=>b.onclick=()=>{rateQuestion(q.id,b.dataset.frate);renderFlash(c)})}
function renderAnalytics(c){const hist=state.history.filter(x=>x.type==='exam').slice(-10);c.innerHTML=`<div class="panel pixel-box"><div class="panel-title"><div><h2>เรดาร์จุดแข็ง–จุดอ่อน</h2><small>ข้อมูลคำนวณจากคำตอบที่บันทึกไว้ในเครื่องนี้</small></div><button class="btn small dark" id="exportBtn">ส่งออกข้อมูล</button></div><div class="analytics-grid"><div class="chart-card pixel-box"><h3>แนวโน้มคะแนนจำลองสอบ</h3>${historyChart(hist)}</div><div class="mastery-card pixel-box"><h3>Mastery รายหัวข้อ</h3><div class="mastery-list">${cats.map(cat=>{const m=mastery(cat);return `<div class="mastery-row"><span>${cat}</span><div class="mini-bar"><i style="width:${m}%;background:${catMeta[cat].color}"></i></div><b>${m}%</b></div>`}).join('')}</div></div></div><div class="section-head"><div><h2>แนะนำการฝึกครั้งต่อไป</h2><p>${recommendation()}</p></div><button class="btn primary" id="practiceWeak">ฝึกหัวข้ออ่อนที่สุด</button></div></div>`;document.getElementById('practiceWeak').onclick=()=>{const cat=[...cats].sort((a,b)=>mastery(a)-mastery(b))[0];startSession('category',cat)};document.getElementById('exportBtn').onclick=exportData}
function historyChart(h){if(!h.length)return `<div style="height:260px;display:grid;place-items:center;color:var(--muted)">ยังไม่มีประวัติจำลองสอบ<br>ลองทำสนาม 90 นาทีสักครั้ง</div>`;const w=600,hg=230,p=28,max=75,pts=h.map((x,i)=>({x:p+i*((w-2*p)/Math.max(1,h.length-1)),y:hg-p-(x.score/max)*(hg-2*p),v:x.score}));return `<svg viewBox="0 0 ${w} ${hg}" aria-label="กราฟคะแนน"><line class="axis" x1="${p}" y1="${hg-p}" x2="${w-p}" y2="${hg-p}"/><line class="axis" x1="${p}" y1="${p}" x2="${p}" y2="${hg-p}"/><polyline class="trend" points="${pts.map(x=>x.x+','+x.y).join(' ')}"/>${pts.map((x,i)=>`<circle class="dot" cx="${x.x}" cy="${x.y}" r="6"/><text x="${x.x}" y="${x.y-12}" fill="#f7f5df" text-anchor="middle" font-size="12">${x.v}</text>`).join('')}</svg>`}
function recommendation(){const arr=cats.map(c=>[c,mastery(c)]).sort((a,b)=>a[1]-b[1]);return `ควรเริ่มจาก “${arr[0][0]}” (${arr[0][1]}%) แล้วตามด้วย “${arr[1][0]}” (${arr[1][1]}%)`}
function exportData(){const blob=new Blob([JSON.stringify({...state,wrong:[...state.wrong],session:null,examTimerId:null},null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='teacher-quest-progress.json';a.click();URL.revokeObjectURL(a.href)}
const ACH=[
{id:'first',icon:'star',title:'ก้าวแรกของว่าที่ครู',desc:'ตอบคำถามข้อแรก',ok:()=>answeredCount()>=1},
{id:'ten',icon:'sword',title:'นักรบ 10 ข้อ',desc:'ฝึกครบ 10 ข้อ',ok:()=>answeredCount()>=10},
{id:'combo5',icon:'fire',title:'คอมโบไฟลุก',desc:'ตอบถูกต่อเนื่อง 5 ข้อ',ok:()=>state.comboBest>=5},
{id:'half',icon:'map',title:'ครึ่งทางแล้ว',desc:'ฝึกครบอย่างน้อย 38 ข้อ',ok:()=>answeredCount()>=38},
{id:'all',icon:'trophy',title:'ผู้พิชิต 75 ข้อ',desc:'เคยฝึกครบทุกข้อ',ok:()=>answeredCount()>=75},
{id:'exam60',icon:'clock',title:'ผ่านด่านสนามจริง',desc:'จำลองสอบได้ 60 คะแนนขึ้นไป',ok:()=>state.history.some(x=>x.type==='exam'&&x.score>=60)},
{id:'master',icon:'badge',title:'มาสเตอร์หนึ่งด่าน',desc:'หัวข้อใดหัวข้อหนึ่ง Mastery 90%',ok:()=>cats.some(c=>mastery(c)>=90)},
{id:'legend',icon:'trophy',title:'ตำนานครูเควสต์',desc:'ทุกหัวข้อ Mastery 80% ขึ้นไป',ok:()=>cats.every(c=>mastery(c)>=80)}];
function checkAchievements(){let changed=false;ACH.forEach(a=>{if(a.ok()&&!state.achievements.includes(a.id)){state.achievements.push(a.id);state.coins+=20;changed=true;setTimeout(()=>{toast('🏆 ปลดล็อก: '+a.title);confetti()},300)}});if(changed)persist()}
function renderAchievements(c){c.innerHTML=`<div class="panel pixel-box"><div class="panel-title"><div><h2>หอเกียรติยศ</h2><small>ปลดล็อกตราจากการฝึกจริง ไม่ใช่แค่เปิดดู</small></div><span class="pill gold">${state.achievements.length}/${ACH.length}</span></div><div class="achievement-grid">${ACH.map(a=>{const ok=state.achievements.includes(a.id);return `<div class="achievement pixel-box ${ok?'':'locked'}">${px(a.icon,60,ok?'#ffd45c':'#69718d')}<h3>${a.title}</h3><p>${a.desc}</p><span class="unlock">${ok?'UNLOCKED':'LOCKED'}</span></div>`}).join('')}</div></div>`}
function settingsModal(){document.getElementById('modalRoot').innerHTML=`<div class="modal" id="settingsModal"><div class="modal-card pixel-box"><div class="modal-head"><h3>ตั้งค่าครูเควสต์</h3><button class="close" id="closeModal">×</button></div>${settingRow('เสียงเอฟเฟกต์','เสียงเลือกคำตอบ โจมตี และปลดล็อก','sound',state.sound)}${settingRow('เส้นสแกน Pixel CRT','เพิ่มบรรยากาศเกมย้อนยุค','scanlines',state.scanlines)}<div class="setting-row"><div><b>ล้างความคืบหน้า</b><small>ลบคะแนน XP ประวัติ และแฟลชการ์ดทั้งหมด</small></div><button class="btn pink small" id="resetAll">ล้างข้อมูล</button></div><div class="setting-row"><div><b>เกี่ยวกับเนื้อหา</b><small>ข้อสอบ 75 ข้อจากเอกสารที่ผู้ใช้ส่งมา พร้อมคำอธิบายเพื่อการฝึกฝน</small></div></div></div></div>`;document.getElementById('closeModal').onclick=()=>document.getElementById('modalRoot').innerHTML='';document.querySelectorAll('[data-toggle]').forEach(b=>b.onclick=()=>{const k=b.dataset.toggle;state[k]=!state[k];persist();settingsModal()});document.getElementById('resetAll').onclick=()=>{if(confirm('ล้างความคืบหน้าทั้งหมดจริงหรือไม่?')){localStorage.removeItem(STORE);location.reload()}}}
function settingRow(t,d,k,on){return `<div class="setting-row"><div><b>${t}</b><small>${d}</small></div><button class="toggle ${on?'on':''}" data-toggle="${k}"><i></i></button></div>`}
function init(){document.getElementById('brandLogo').innerHTML=px('logo',46);document.getElementById('coinIcon').innerHTML=px('coin',22);document.getElementById('fireIcon').innerHTML=px('fire',22);document.getElementById('sideAvatar').innerHTML=teacherSprite();document.getElementById('soundBtn').onclick=()=>{state.sound=!state.sound;persist();beep(700,.06)};document.getElementById('settingsBtn').onclick=settingsModal;document.addEventListener('keydown',e=>{if(state.route==='quiz'&&state.session){if(['1','2','3','4'].includes(e.key)&&!state.session.revealed)selectOption(+e.key-1);if(e.key==='Enter'){e.preventDefault();state.session.revealed?nextQuestion():checkAnswer()}}});touchStreak();render()}
init();
</script>
</body></html>
